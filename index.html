<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>VaulTxt</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inconsolata:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;background:#0a0a0f}
body{height:100%;font-family:'Syne',sans-serif;background:#0a0a0f;color:#e8e4f0;overflow:hidden;position:fixed;width:100%}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#17171f;--border:#22222e;--border2:#2a2a38;
  --accent:#c8a8ff;--accent2:#9d6fff;--glow:rgba(157,111,255,.18);
  --text:#e8e4f0;--text2:#9994aa;--text3:#55506a;
  --danger:#ff6b8a;--success:#6bffb8;--mono:'Inconsolata',monospace;
  --radius:16px;--sb:env(safe-area-inset-bottom,0px);
}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
#topbar{flex-shrink:0;padding:max(env(safe-area-inset-top,0px),12px) 20px 0}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;height:52px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:baseline;gap:2px}
.logo-v{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px;line-height:1}
.logo-rest{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.logo-dot{width:6px;height:6px;background:var(--accent2);border-radius:50%;margin-left:3px;align-self:center;box-shadow:0 0 8px var(--accent2)}
.topbar-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s}
.icon-btn:active{background:var(--surface2);transform:scale(.93)}
.storage-badge{font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 7px}
#tabs{flex-shrink:0;display:flex;gap:4px;padding:10px 20px 0}
.tab{flex:1;padding:8px 0;border:none;background:transparent;color:var(--text3);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#content{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px;padding-bottom:calc(20px + var(--sb));opacity:0;pointer-events:none;transform:translateX(12px);transition:opacity .2s,transform .2s}
.panel.active{opacity:1;pointer-events:all;transform:translateX(0)}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
#search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 14px 11px 38px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none}
#search::placeholder{color:var(--text3)}
.section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
#file-list{display:flex;flex-direction:column;gap:8px}
.file-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;-webkit-user-select:none;animation:fsu .2s ease both}
.file-item::before{content:'';position:absolute;inset:0;background:var(--glow);opacity:0;transition:opacity .15s}
.file-item:active::before{opacity:1}
.file-item:active{transform:scale(.98)}
.file-icon{width:40px;height:40px;border-radius:10px;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.file-meta{font-family:var(--mono);font-size:11px;color:var(--text3)}
.file-actions{display:flex;gap:6px;flex-shrink:0}
.fac{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .15s}
.fac:active{transform:scale(.88)}
.fac.del:active{background:#2a0f15;border-color:#5a1a25;color:var(--danger)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;text-align:center;gap:12px}
.empty-icon{font-size:48px;opacity:.2}
.empty-title{font-size:16px;font-weight:700;color:var(--text2)}
.empty-sub{font-size:13px;color:var(--text3);line-height:1.6}
.write-wrap{display:flex;flex-direction:column;gap:12px;height:100%}
.title-input{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'Syne',sans-serif;font-size:16px;font-weight:600;outline:none;width:100%;transition:border-color .15s}
.title-input:focus{border-color:var(--accent2)}
.title-input::placeholder{color:var(--text3)}
.ext-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.ext-row::-webkit-scrollbar{display:none}
.ext-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s}
.ext-chip.active{background:var(--glow);border-color:var(--accent2);color:var(--accent)}
.ext-chip:active{transform:scale(.93)}
#editor-wrap{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;min-height:0}
.editor-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface2)}
.editor-info{font-family:var(--mono);font-size:10px;color:var(--text3)}
.mini-btn{padding:5px 11px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.mini-btn:active{transform:scale(.93);background:var(--surface2)}
#editor{flex:1;background:transparent;border:none;padding:16px;color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.8;resize:none;outline:none;overflow-y:auto;width:100%}
#editor::placeholder{color:var(--text3)}
.save-bar{flex-shrink:0;padding-top:10px}
.save-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent2),#7b4fd4);border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;box-shadow:0 4px 20px rgba(157,111,255,.3)}
.save-btn:active{transform:scale(.97)}
.save-btn:disabled{opacity:.4;pointer-events:none}
.read-topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-shrink:0}
.back-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.back-btn:active{background:var(--surface2);transform:scale(.93)}
.read-title{flex:1;min-width:0;font-size:16px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.read-content{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;font-family:var(--mono);font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap;word-break:break-word;overflow-y:auto;flex:1;min-height:0}
.read-actions{display:flex;gap:10px;margin-top:12px;flex-shrink:0}
.read-btn{flex:1;padding:13px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.read-btn:active{transform:scale(.96)}
.read-btn.danger{border-color:#3a1020;color:var(--danger);background:#1a080e}
#read-panel{display:flex;flex-direction:column}
/* toast */
#toast{position:fixed;bottom:calc(24px + var(--sb));left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:11px 20px;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;z-index:300;opacity:0;transition:all .25s;pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:rgba(107,255,184,.3);color:var(--success)}
#toast.error{border-color:rgba(255,107,138,.3);color:var(--danger)}
/* confirm sheet */
#confirm-sheet{position:fixed;inset:0;background:rgba(10,10,15,.7);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
#confirm-sheet.show{opacity:1;pointer-events:all}
.sheet-card{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--sb));transform:translateY(100%);transition:transform .3s cubic-bezier(.22,.61,.36,1)}
#confirm-sheet.show .sheet-card{transform:translateY(0)}
.sheet-title{font-size:16px;font-weight:700;margin-bottom:6px}
.sheet-sub{font-size:13px;color:var(--text3);margin-bottom:20px;line-height:1.5;word-break:break-all}
.sheet-btns{display:flex;flex-direction:column;gap:10px}
.sheet-btn{padding:14px;border-radius:13px;border:none;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.sheet-btn.danger{background:var(--danger);color:#0a0a0f}
.sheet-btn.cancel{background:var(--surface);border:1px solid var(--border);color:var(--text2)}
.loader-ring{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fsu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <span class="logo-v">V</span><span class="logo-rest">aulTxt</span>
        <div class="logo-dot"></div>
      </div>
      <div class="topbar-right">
        <span class="storage-badge" id="storage-badge">—</span>
        <button class="icon-btn" id="refresh-btn" title="Refresh">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div id="tabs">
    <button class="tab active" data-tab="vault">Vault</button>
    <button class="tab" data-tab="write">Write</button>
  </div>
  <div id="content">
    <div class="panel active" id="vault-panel">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search" placeholder="Search notes…" autocomplete="off" spellcheck="false"/>
      </div>
      <div class="section-label" id="list-label">All notes</div>
      <div id="file-list"></div>
    </div>
    <div class="panel" id="write-panel">
      <div class="write-wrap">
        <input type="text" id="note-title" class="title-input" placeholder="Untitled note…" autocomplete="off" spellcheck="false"/>
        <div class="ext-row" id="ext-row">
          <button class="ext-chip active" data-ext=".txt">.txt</button>
          <button class="ext-chip" data-ext=".md">.md</button>
          <button class="ext-chip" data-ext=".json">.json</button>
          <button class="ext-chip" data-ext=".csv">.csv</button>
          <button class="ext-chip" data-ext=".log">.log</button>
          <button class="ext-chip" data-ext=".yaml">.yaml</button>
          <button class="ext-chip" data-ext=".sh">.sh</button>
          <button class="ext-chip" data-ext=".js">.js</button>
          <button class="ext-chip" data-ext=".py">.py</button>
        </div>
        <div id="editor-wrap">
          <div class="editor-toolbar">
            <span class="editor-info" id="editor-info">0 chars · 1 line</span>
            <button class="mini-btn" id="clear-btn">Clear</button>
          </div>
          <textarea id="editor" placeholder="Start writing…" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
        </div>
        <div class="save-bar">
          <button class="save-btn" id="save-btn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Save to Vault
          </button>
        </div>
      </div>
    </div>
    <div class="panel" id="read-panel">
      <div class="read-topbar">
        <button class="back-btn" id="read-back"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="read-title" id="read-title">—</div>
      </div>
      <div class="read-content" id="read-content"></div>
      <div class="read-actions">
        <button class="read-btn" id="read-dl"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download</button>
        <button class="read-btn" id="read-copy"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button>
        <button class="read-btn danger" id="read-del"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>Delete</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="confirm-sheet">
  <div class="sheet-card">
    <div class="sheet-title" id="sheet-title">Delete note?</div>
    <div class="sheet-sub" id="sheet-sub"></div>
    <div class="sheet-btns">
      <button class="sheet-btn danger" id="sheet-confirm">Delete</button>
      <button class="sheet-btn cancel" id="sheet-cancel">Cancel</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
//  CONFIGURATION  —  paste your StoreGit API key here
// ─────────────────────────────────────────────────────────────
const API_KEY  = 'sgk_1iiXqSO-EUiu6wYD1bNUgc5SbKGGzQCKBlcEcvjFNko';          // ← your key
const API_BASE = 'https://storegit.pages.dev'; // ← StoreGit URL
// ─────────────────────────────────────────────────────────────

// ── Thin StoreGit API wrapper (no external library needed) ───
//
//  Every method sends X-API-Key and hits the correct endpoint.
//  The StoreGit API reference is at:  GET <API_BASE>/api/
//
const api = {

  // List all files in the active repo
  list() {
    return _get('files');
  },

  // Read a file as plain text  (used for the note viewer)
  async readText(name) {
    const r = await fetch(`${API_BASE}/api/download?name=${encodeURIComponent(name)}`, {
      headers: { 'X-API-Key': API_KEY },
    });
    if (!r.ok) {
      const body = await r.json().catch(() => ({}));
      throw new Error(body.error || `HTTP ${r.status}`);
    }
    return r.text();
  },

  // Upload a text note  (content → UTF-8 → base64, ≤ 5 MB)
  upload(name, textContent) {
    const b64 = btoa(unescape(encodeURIComponent(textContent)));
    return _post('upload', { name, content: b64 });
  },

  // Delete a file.  Pass sha for regular files, omit for chunked.
  delete(name, sha, chunked = false) {
    return _del('delete', chunked ? { name, chunked: true } : { name, sha });
  },

  // Download a file as a browser Save-As dialog
  async saveAs(name) {
    const r = await fetch(`${API_BASE}/api/download?name=${encodeURIComponent(name)}`, {
      headers: { 'X-API-Key': API_KEY },
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  },
};

// ── Internal fetch helpers ────────────────────────────────────

async function _get(path) {
  const r = await fetch(`${API_BASE}/api/${path}`, {
    headers: { 'X-API-Key': API_KEY },
  });
  return _unwrap(r);
}
async function _post(path, body) {
  const r = await fetch(`${API_BASE}/api/${path}`, {
    method: 'POST',
    headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return _unwrap(r);
}
async function _del(path, body) {
  const r = await fetch(`${API_BASE}/api/${path}`, {
    method: 'DELETE',
    headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return _unwrap(r);
}
async function _unwrap(r) {
  const ct = r.headers.get('Content-Type') || '';
  const data = ct.includes('json') ? await r.json() : await r.text();
  if (!r.ok) throw new Error((data && data.error) || `HTTP ${r.status}`);
  return data;
}

// ── App state ─────────────────────────────────────────────────
let allFiles = [], currentFile = null, activeExt = '.txt', toastTimer, confirmCb = null;
const $ = id => document.getElementById(id);

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = $('toast'), icons = { success: '✓', error: '✕', info: '·' };
  el.textContent = (icons[type] || '·') + ' ' + msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Confirm sheet ─────────────────────────────────────────────
function confirm(title, sub, cb) {
  $('sheet-title').textContent = title;
  $('sheet-sub').textContent   = sub;
  confirmCb = cb;
  $('confirm-sheet').classList.add('show');
}
$('sheet-confirm').onclick = () => {
  $('confirm-sheet').classList.remove('show');
  if (confirmCb) { confirmCb(); confirmCb = null; }
};
$('sheet-cancel').onclick = () => { $('confirm-sheet').classList.remove('show'); confirmCb = null; };
$('confirm-sheet').addEventListener('click', e => {
  if (e.target === $('confirm-sheet')) { $('confirm-sheet').classList.remove('show'); confirmCb = null; }
});

// ── Helpers ───────────────────────────────────────────────────
function fmtSize(b) {
  if (!b) return '—';
  if (b < 1024)    return b + 'B';
  if (b < 1048576) return (b / 1024).toFixed(1) + 'KB';
  return (b / 1048576).toFixed(1) + 'MB';
}
function fmtDate(d) {
  if (!d) return '';
  const diff = Date.now() - new Date(d);
  if (diff < 60000)    return 'just now';
  if (diff < 3600000)  return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function fileEmoji(n) {
  const e = (n || '').split('.').pop().toLowerCase();
  return { txt:'📄', md:'📝', json:'🗂', csv:'📊', log:'📋', yaml:'⚙️', yml:'⚙️',
           sh:'💻', bash:'💻', js:'🟨', ts:'🔷', py:'🐍', html:'🌐', css:'🎨',
           xml:'📦', sql:'🗄', rb:'💎' }[e] || '📄';
}
function showPanel(n) {
  ['vault-panel', 'write-panel', 'read-panel'].forEach(id => $(id).classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === n || (n === 'read' && t.dataset.tab === 'vault'))
  );
  $(n + '-panel').classList.add('active');
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => showPanel(t.dataset.tab)));

// ── File list ─────────────────────────────────────────────────
function renderList(files) {
  const q        = $('search').value.trim().toLowerCase();
  const filtered = q ? files.filter(f => (f.originalName || f.name).toLowerCase().includes(q)) : files;
  $('list-label').textContent = q
    ? `${filtered.length} result${filtered.length !== 1 ? 's' : ''} for "${q}"`
    : `${files.length} note${files.length !== 1 ? 's' : ''}`;

  const list = $('file-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${q ? '🔍' : '🗄'}</div>
      <div class="empty-title">${q ? 'Nothing found' : 'Vault is empty'}</div>
      <div class="empty-sub">${q ? `No notes match "${q}"` : 'Tap Write to create your first note'}</div>
    </div>`;
    return;
  }
  list.innerHTML = '';
  filtered.forEach((f, i) => {
    const name = f.originalName || f.name;
    const item = document.createElement('div');
    item.className = 'file-item';
    item.style.animationDelay = (i * 0.04) + 's';
    item.innerHTML = `
      <div class="file-icon">${fileEmoji(name)}</div>
      <div class="file-info">
        <div class="file-name">${name}</div>
        <div class="file-meta">${fmtSize(f.size)}${f.uploadedAt ? ' · ' + fmtDate(f.uploadedAt) : ''}</div>
      </div>
      <div class="file-actions">
        <button class="fac" data-a="dl" title="Download">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="fac del" data-a="del" title="Delete">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>`;

    item.addEventListener('click', e => { if (!e.target.closest('.fac')) openFile(f); });
    item.querySelector('[data-a="dl"]').addEventListener('click', e => {
      e.stopPropagation();
      api.saveAs(name).catch(err => toast(err.message, 'error'));
    });
    item.querySelector('[data-a="del"]').addEventListener('click', e => {
      e.stopPropagation();
      confirm('Delete note?', name, async () => {
        try {
          await api.delete(f.name, f.sha, f.chunked);
          toast('Deleted', 'success');
          await loadFiles();
        } catch (err) { toast(err.message, 'error'); }
      });
    });
    list.appendChild(item);
  });
}

async function loadFiles() {
  try {
    const files = await api.list();
    allFiles = (Array.isArray(files) ? files : (files.files || files))
      .filter(f => f.name !== '.storegit')
      .sort((a, b) =>
        (!a.uploadedAt && !b.uploadedAt) ? 0 :
        !a.uploadedAt ? 1 : !b.uploadedAt ? -1 :
        new Date(b.uploadedAt) - new Date(a.uploadedAt)
      );
    renderList(allFiles);
    const total = allFiles.reduce((s, f) => s + (f.size || 0), 0);
    $('storage-badge').textContent = fmtSize(total) || '0B';
  } catch (err) { toast('Load failed: ' + err.message, 'error'); }
}

$('search').addEventListener('input', () => renderList(allFiles));
$('refresh-btn').addEventListener('click', async () => {
  $('refresh-btn').style.opacity = '.4';
  await loadFiles();
  $('refresh-btn').style.opacity = '';
  toast('Refreshed', 'success');
});

// ── Read / view a file ────────────────────────────────────────
async function openFile(f) {
  currentFile = f;
  $('read-title').textContent  = f.originalName || f.name;
  $('read-content').textContent = 'Loading…';
  showPanel('read');
  try {
    $('read-content').textContent = await api.readText(f.originalName || f.name);
  } catch (err) {
    $('read-content').textContent = 'Could not load: ' + err.message;
  }
}
$('read-back').addEventListener('click',  () => { showPanel('vault'); currentFile = null; });
$('read-dl').addEventListener('click',    () => { if (currentFile) api.saveAs(currentFile.originalName || currentFile.name).catch(err => toast(err.message, 'error')); });
$('read-copy').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText($('read-content').textContent); toast('Copied', 'success'); }
  catch { toast('Copy not supported', 'error'); }
});
$('read-del').addEventListener('click', () => {
  if (!currentFile) return;
  const name = currentFile.originalName || currentFile.name;
  confirm('Delete note?', name, async () => {
    try {
      await api.delete(currentFile.name, currentFile.sha, currentFile.chunked);
      toast('Deleted', 'success');
      showPanel('vault');
      currentFile = null;
      await loadFiles();
    } catch (err) { toast(err.message, 'error'); }
  });
});

// ── Write / editor ────────────────────────────────────────────
document.querySelectorAll('.ext-chip').forEach(c => c.addEventListener('click', () => {
  document.querySelectorAll('.ext-chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active');
  activeExt = c.dataset.ext;
}));
const editor = $('editor');
editor.addEventListener('input', () => {
  const ch = editor.value.length, ln = editor.value.split('\n').length;
  $('editor-info').textContent = `${ch} char${ch !== 1 ? 's' : ''} · ${ln} line${ln !== 1 ? 's' : ''}`;
  $('save-btn').disabled = !editor.value.trim();
});
$('clear-btn').addEventListener('click', () => {
  if (!editor.value.trim()) return;
  confirm('Clear editor?', 'This will erase your draft.', () => {
    editor.value = '';
    $('note-title').value = '';
    $('editor-info').textContent = '0 chars · 1 line';
    $('save-btn').disabled = true;
  });
});
$('save-btn').addEventListener('click', async () => {
  const content = editor.value.trim();
  if (!content) return;
  const raw  = $('note-title').value.trim();
  const name = raw ? (raw.includes('.') ? raw : raw + activeExt) : `note-${Date.now()}${activeExt}`;
  const btn  = $('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loader-ring"></div> Saving…';
  try {
    await api.upload(name, content);
    toast('Saved as ' + name, 'success');
    editor.value = '';
    $('note-title').value = '';
    $('editor-info').textContent = '0 chars · 1 line';
    await loadFiles();
    showPanel('vault');
  } catch (err) { toast(err.message, 'error'); }
  btn.disabled = false;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Save to Vault';
});

// ── Boot ──────────────────────────────────────────────────────
loadFiles();
</script>
</body>
</html>
